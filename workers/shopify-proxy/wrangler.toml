name = "shopify-proxy"
main = "worker.js"
compatibility_date = "2024-10-01"

[vars]
APP_URL = "https://app-calculadora-lucas.pages.dev"
SCOPES = "read_orders,read_products,read_all_orders"
API_VERSION = "2026-01"

# KV namespace for OAuth state + access tokens.
# Create with:  npx wrangler kv namespace create SHOPIFY_TOKENS
# Then paste the returned id below.
[[kv_namespaces]]
binding = "SHOPIFY_TOKENS"
id = "7a0644d773434354ab55bda8ab047a58"
